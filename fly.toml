# fly.toml app configuration file generated for mairdrop on 2026-01-13T10:13:51Z
#
# See https://fly.io/docs/reference/configuration/ for information about how to use this file.
#

app = 'mairdrop'
primary_region = 'fra'

[build]

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = false
  auto_start_machines = true
  min_machines_running = 1
  processes = ['app']

[[vm]]
  cpu_kind = 'shared'
  cpus = 1
  memory_mb = 1024
