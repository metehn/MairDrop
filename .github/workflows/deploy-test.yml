name: Test Deploy

on:
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven
      - name: Maven Build, Test and Checkstyle
        run: mvn clean verify
      - name: Upload Jacoco Artifact
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/
      - name: Login to GHCR
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}
      - name: Build and Push Docker Image
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mairdrop:test
      - name: Deploy to Test Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.TEST_SERVER_HOST }}
          username: ${{ secrets.TEST_SERVER_USER }}
          key: ${{ secrets.TEST_SERVER_SSH_KEY }}
          script: |
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin
            docker pull ghcr.io/${{ github.repository_owner }}/mairdrop:test
            docker stop mairdrop || true
            docker rm mairdrop || true
            docker run -d --name mairdrop -p 8080:8080 --restart always \
              -e WEBRTC_TURN_URL="${{ secrets.TEST_TURN_URL }}" \
              -e WEBRTC_TURN_USERNAME="${{ secrets.TEST_TURN_USERNAME }}" \
              -e WEBRTC_TURN_CREDENTIAL="${{ secrets.TEST_TURN_CREDENTIAL }}" \
              ghcr.io/${{ github.repository_owner }}/mairdrop:test
