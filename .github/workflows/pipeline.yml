name: Mairdrop CI/CD Pipeline

on:
  push:
    branches: [ "master", "develop" ]
  pull_request:
    branches: [ "master", "develop" ]

permissions:
  pull-requests: write
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      # Checkstyle ve JaCoCo verify fazında otomatik çalışacaktır
      - name: Maven Build, Test and Checkstyle
        run: mvn clean verify

      - name: Upload Jacoco Artifact
        uses: actions/upload-artifact@v7
        with:
          name: jacoco-report
          path: target/site/jacoco/

      - name: Jacoco Report to PR
        if: github.event_name == 'pull_request'
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 80
          title: "🚀 Mairdrop Code Coverage Raporu"

      - name: Login to GHCR
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v7
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mairdrop:latest

  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - name: Set up JDK 17
        uses: actions/setup-java@v5
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install e2e dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium

      - name: Run Playwright e2e tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: failure()
        uses: actions/upload-artifact@v7
        with:
          name: playwright-report
          path: playwright-report/
          retention-days: 7

  deploy:
    needs: [ build-and-test, e2e-test ]
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # GHCR Login
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Yeni imajı çek
            docker pull ghcr.io/${{ github.repository_owner }}/mairdrop:latest

            # 1. Port ve Konteyner Temizliği
            docker stop mairdrop mairdrop-app || true
            docker rm mairdrop mairdrop-app || true
            
            PORT_PID=$(docker ps -q --filter "publish=8080")
            if [ ! -z "$PORT_PID" ]; then
              docker stop $PORT_PID && docker rm $PORT_PID
            fi

            # 2. Kurulum
            docker run -d --name mairdrop -p 8080:8080 --restart always \
              -e WEBRTC_TURN_URL="${{ secrets.TURN_URL }}" \
              -e WEBRTC_TURN_USERNAME="${{ secrets.TURN_USERNAME }}" \
              -e WEBRTC_TURN_CREDENTIAL="${{ secrets.TURN_CREDENTIAL }}" \
              ghcr.io/${{ github.repository_owner }}/mairdrop:latest