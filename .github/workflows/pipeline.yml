name: Mairdrop CI/CD Pipeline

on:
  push:
    branches: [ "master" ]
  pull_request:
    branches: [ "master" ]

permissions: # PR üzerine yorum yazabilmesi için gerekli
  pull-requests: write
  contents: read
  packages: write

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: maven

      - name: Maven Build and Test
        run: mvn clean verify

      # RAPORLAMA:
      - name: Jacoco Report to PR
        if: github.event_name == 'pull_request' # Sadece PR'larda yorum yap
        uses: madrapps/jacoco-report@v1.7.1
        with:
          paths: ${{ github.workspace }}/target/site/jacoco/jacoco.xml
          token: ${{ secrets.GITHUB_TOKEN }}
          min-coverage-overall: 60
          title: "🚀 Mairdrop Code Coverage Raporu"

      - name: Login to GHCR
        if: github.ref == 'refs/heads/master'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and Push Docker Image
        if: github.ref == 'refs/heads/master'
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ghcr.io/${{ github.repository_owner }}/mairdrop:latest

  deploy:
    needs: build-and-test
    if: github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
      - name: Deploy to Server via SSH
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.REMOTE_HOST }}
          username: ${{ secrets.REMOTE_USER }}
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            # GHCR Login
            echo ${{ secrets.GITHUB_TOKEN }} | docker login ghcr.io -u ${{ github.repository_owner }} --password-stdin

            # Docker güncelle
            docker pull ghcr.io/${{ github.repository_owner }}/mairdrop:latest
            # Eski konteyneri temizle
            docker stop mairdrop-app || true
            docker rm mairdrop-app || true
            # Yeni konteyneri çalıştır
            docker run -d --name mairdrop-app -p 8080:8080 --restart always ghcr.io/${{ github.repository_owner }}/mairdrop:latest