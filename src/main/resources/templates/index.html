<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MairDrop</title>
    <link rel="icon" type="image/png" th:href="@{/favicon.png}">

    <script src="https://cdn.jsdelivr.net/npm/sockjs-client@1.5.1/dist/sockjs.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/stomp.js/2.3.3/stomp.min.js"></script>

    <link rel="stylesheet" th:href="@{/css/style.css}">
</head>
<body>

<div class="connection-status disconnected" id="connectionStatus">
    <div class="status-dot"></div>
    <span>Connecting...</span>
</div>

<div class="container">
    <div class="header">
        <h1>📁 P2P File Sharing</h1>
        <div class="device-id">
            🖥️ Device ID: <strong id="deviceIdSpan"></strong>
        </div>
    </div>

    <div class="content">
        <div id="alertContainer"></div>

        <div class="section">
            <h2>📤 Send File</h2>

            <div class="file-input-wrapper" id="fileInputWrapper">
                <input type="file" id="fileInput" multiple />
                <div class="file-icon">📎</div>
                <div>
                    <strong>Click to select file(s).</strong>
                    <p style="margin-top: 10px; color: #6c757d;">or drag and drop — multiple files supported</p>
                </div>
            </div>

            <div class="file-info" id="fileInfo">
                <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
                    <strong id="fileCountLabel">Selected file</strong>
                    <button type="button" id="clearFilesBtn" style="padding:5px 12px;background:#e9ecef;border:none;border-radius:6px;cursor:pointer;font-size:0.85em;">✕ Clear</button>
                </div>
                <ul id="fileList" style="list-style:none;padding:0;margin:0;max-height:180px;overflow-y:auto;"></ul>
                <div style="margin-top:10px;padding-top:10px;border-top:1px solid #dee2e6;display:flex;justify-content:space-between;">
                    <strong>Total:</strong>
                    <span id="fileSize" style="font-weight:bold;color:#667eea;"></span>
                </div>
            </div>

            <p id="sendHint" style="margin-top:15px;color:#667eea;font-weight:bold;text-align:center;display:none;">
                ↓ Pick a device below to send to ↓
            </p>
        </div>

        <div class="section">
            <h2>🌐 Connected Devices</h2>
            <div id="deviceList">
                <div class="empty-state">
                    <div class="empty-state-icon">🔍</div>
                    <p>No devices connected yet</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script th:src="@{/js/name-generator.js}"></script>
<script th:src="@{/js/ui-manager.js}"></script>
<script th:src="@{/js/websocket-service.js}"></script>
<script th:src="@{/js/webrtc-service.js}"></script>
<script th:src="@{/js/app.js}"></script>

</body>
</html>
